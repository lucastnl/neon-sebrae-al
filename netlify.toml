[build]
  publish = "."

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    # CSP restringe origens de scripts/styles/conexoes. Combinado com o escape no
    # client, bloqueia execucao de JS injetado via XSS mesmo se algo escapar.
    # Permite Supabase (rest + realtime websocket) e Google Fonts. Inline ainda
    # permitido (JS do jogo e CSS estao inline; refator pra externalizar fica pra depois).
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://ipapi.co https://api.ipify.org; frame-ancestors 'self'; base-uri 'self'; form-action 'self'"
    # Bloqueia features que o jogo nao usa, reduz superficie de ataque
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=(), gyroscope=(), magnetometer=(), accelerometer=()"
    # Cross-origin protections
    Cross-Origin-Opener-Policy = "same-origin"
    X-Permitted-Cross-Domain-Policies = "none"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTMLs principais nunca cacheados, evita "precisar dar Cmd+Shift+R" no totem
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/jogar/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/jogos/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/dashboard/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/cocriacao/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/jornada/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/hub/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/experiencias/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

[[headers]]
  for = "/fichas/*"
  [headers.values]
    Cache-Control = "no-store, max-age=0, must-revalidate"

# Rotas amigáveis
[[redirects]]
  from = "/jogar"
  to = "/jogar/monstro/"
  status = 301

[[redirects]]
  from = "/jogar/monstro"
  to = "/jogos/monstro-proximo-passo/"
  status = 200

[[redirects]]
  from = "/jogar/monstro/"
  to = "/jogos/monstro-proximo-passo/"
  status = 200

[[redirects]]
  from = "/placar"
  to = "/dashboard/"
  status = 301

[[redirects]]
  from = "/cocriar"
  to = "/cocriacao/"
  status = 301

[[redirects]]
  from = "/jornada"
  to = "/jornada/"
  status = 301

[[redirects]]
